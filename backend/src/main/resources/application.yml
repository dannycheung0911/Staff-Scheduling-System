server:
  port: 8080

spring:
  #  datasource:
  #    url: jdbc:h2:file:./data/schedulingdb;AUTO_SERVER=TRUE
  #    driver-class-name: org.h2.Driver
  #    username: sa
  #    password: password
  #   切换为MySQL时：
  datasource:
    url: jdbc:mysql://localhost:3306/scheduling?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        # For MySQL: org.hibernate.dialect.MySQL8Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

jwt:
  secret: metro-scheduling-secret-key-2024-延安三路站排班系统
  expiration: 86400000  # 24 hours in ms

app:
  upload-dir: ./uploads
  # 班次预警配置：每天各岗位需要1人
  required-shifts:
    - A1
    - A2
    - C1
    - C2
    - F1
    - F2
    - E2

logging:
  level:
    com.metro.scheduling: INFO
